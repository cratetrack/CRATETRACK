<html lang="en">

<style>
:root{
  --bg:#F5F7FA;--card:#fff;--border:#E4E9F0;--text:#1A2332;--muted:#6B7A99;

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-tap-highlight-color:transparent}
input,select,textarea,button{font-family:inherit;font-size:14px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#D1D9E6;border-radius:3px}
.page{min-height:100vh;display:flex;flex-direction:column;width:100%}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:54px;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}

.tab-bar::-webkit-scrollbar{height:0}
.tab-btn{padding:12px 16px;border:none;background:none;cursor:pointer;font-weight:600;font-size:13px;color:var(--muted);border-bottom:2.5px solid transparent;margin-bottom:-1.5px;white-space:nowrap;transition:color .15s}
.tab-btn.on{color:var(--primary);border-bottom-color:var(--primary)}
.bw{flex:1;padding:20px;max-width:1100px;width:100%;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--rlg);padding:16px;margin-bottom:14px;box-shadow:var(--sh)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
.gas{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:10px}

.fxw{display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.fxb{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}

.inp{width:100%;background:#F8FAFD;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;outline:none;transition:border-color .15s;color:var(--text)}

.bg{background:var(--green);color:#fff}
.br{background:var(--red);color:#fff}
.bt{background:var(--teal);color:#fff}

.bwa{background:#25D366;color:#fff}
.bor{background:var(--orange);color:#fff}

.sm{padding:5px 10px;font-size:12px;border-radius:7px}
.full{width:100%;justify-content:center;padding:11px}
.err{background:var(--red-lt);border:1px solid #FBBFBF;border-radius:8px;padding:8px 12px;font-size:12px;color:var(--red);font-weight:600;margin-bottom:10px}

.pw{background:#EDF0F7;border-radius:6px;height:8px;overflow:hidden;margin-bottom:4px}
.pb{height:8px;border-radius:6px;transition:width .3s}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:4px}
.sn{font-size:24px;font-weight:800}
.sl{font-size:11px;color:var(--muted)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:#F5F7FA;padding:7px 10px;text-align:left;font-weight:700;color:var(--muted);font-size:10px;letter-spacing:.04em;border-bottom:1px solid var(--border)}

.sh{font-weight:700;font-size:11px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin:18px 0 10px}
.mov{position:fixed;inset:0;background:rgba(15,20,40,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:14px}
.mbox{background:#fff;border-radius:var(--rlg);width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.mhdr{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:1}
.mbdy{padding:18px}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:linear-gradient(145deg,#1A2332,#2D3F5F 50%,#1A3A2A)}

.crow{background:#253447;border-radius:8px;padding:8px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.cval{font-family:monospace;font-weight:700;font-size:13px;word-break:break-all}
@media(max-width:600px){.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}.bw{padding:12px}}
</style>

// ── BALANCE LOGIC ────────────────────────────────────────────
// Balance = total OUT (all time) - total IN (all time)
// OUT can exceed IN — that means they OWE more crates
// Positive balance = person owes crates to mandi
function getBal(txns,pid){
  const mine=txns.filter(t=>t.personId===pid);
  const totalOut=mine.filter(t=>t.dir==="OUT").reduce((s,t)=>s+t.qty,0);
  const totalIn=mine.filter(t=>t.dir==="IN").reduce((s,t)=>s+t.qty,0);
  const balance=totalOut-totalIn; // positive = owes mandi
  return{totalOut,totalIn,balance:Math.max(0,balance)};
}

// ── TOAST ────────────────────────────────────────────────────
let toastTmr=null;
function toast(msg,type="ok"){
  let t=document.getElementById("_t");
  if(!t){t=document.createElement("div");t.id="_t";document.body.appendChild(t);}
  t.textContent=(type==="err"?"⚠️ ":type==="warn"?"⚡ ":"✅ ")+msg;
  Object.assign(t.style,{position:"fixed",bottom:"24px",left:"50%",transform:"translateX(-50%)",
    background:type==="err"?T.red:type==="warn"?T.gold:T.green,color:"#fff",padding:"10px 22px",
    borderRadius:"10px",fontWeight:"700",fontSize:"13px",zIndex:"9999",
    boxShadow:"0 4px 20px rgba(0,0,0,.25)",whiteSpace:"nowrap",display:"block"});
  if(toastTmr)clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>{if(t.parentNode)t.remove();},3200);
}

// ── DOM ──────────────────────────────────────────────────────
function el(tag,a={},k=[]){
  const e=document.createElement(tag);
  const kids=Array.isArray(k)?k:(k!=null?[k]:[]);
  for(const[p,v]of Object.entries(a||{})){
    if(v==null)continue;
    if(p==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(p==="cls")e.className=v;
    else if(p.startsWith("on")&&typeof v==="function")e.addEventListener(p.slice(2).toLowerCase(),v);
    else e.setAttribute(p,String(v));
  }
  for(const c of kids){
    if(c==null)continue;
    e.appendChild(c instanceof Node?c:document.createTextNode(String(c)));
  }
  return e;
}
const D=(cls,k=[],st={})=>{
  const kids=Array.isArray(k)?k:(k!=null?[k]:[]);
  return el("div",{cls,style:st},kids);
};
const S=(cls,k=[])=>{
  const kids=Array.isArray(k)?k:(k!=null?[k]:[]);
  return el("span",{cls},kids);
};

function Inp(ph,val,cb,type="text",extraCls=""){
  const i=el("input",{type,value:val==null?"":String(val),placeholder:ph,cls:"inp "+(extraCls||"")});
  i.addEventListener("input",e=>cb(e.target.value));
  return i;
}
function Sel(val,opts,cb,extraCls=""){
  const s=el("select",{cls:"inp "+(extraCls||"")});
  (opts||[]).forEach(([v,l])=>{const o=el("option",{value:v},[l]);if(String(v)===String(val))o.selected=true;s.appendChild(o);});
  s.addEventListener("change",e=>cb(e.target.value));
  return s;
}
function Fld(lbl,inputEl,note=""){

}

// ── MESSAGES ─────────────────────────────────────────────────
function buildWA(name,vno,crIn,crOut,bal,mName){
  return `📦 *${mName}* నుండి సందేశం\n\nప్రియమైన *${name}* గారికి,\n\nవాహనం: *${vno||"—"}*\n📥 నేడు వచ్చిన క్రేట్లు: *${crIn}*\n📤 నేడు వెళ్ళిన క్రేట్లు: *${crOut}*\n⚖️ మీ దగ్గర మొత్తం బాకీ: *${bal} క్రేట్లు*\n\nదయచేసి వీలైనంత త్వరగా తిరిగి ఇవ్వగలరు.\n📞 మండీ కార్యాలయం సంప్రదించండి.\n— _CrateTrack Pro_`;
}
function buildSMS(name,vno,crIn,crOut,bal,mName){
  return `${mName} నుండి సందేశం:\n${name} గారికి,\nవాహనం: ${vno||"—"}\nవచ్చిన క్రేట్లు: ${crIn}\nవెళ్ళిన క్రేట్లు: ${crOut}\nమీ దగ్గర బాకీ: ${bal} క్రేట్లు\nవీలైనంత త్వరగా తిరిగి ఇవ్వగలరు - CrateTrack`;
}
function sendMsgs(people,txns,mName,vno="—",onlyBal=true){
  const toSend=[];
  people.forEach(p=>{
    if(!p||!p.phone)return;
    const b=getBal(txns,p.id);
    if(onlyBal&&b.balance<=0)return;
    const inT=txns.filter(t=>t.personId===p.id&&t.dir==="IN"&&t.date===today()).reduce((s,t)=>s+t.qty,0);
    const outT=txns.filter(t=>t.personId===p.id&&t.dir==="OUT"&&t.date===today()).reduce((s,t)=>s+t.qty,0);
    toSend.push({p,crIn:inT,crOut:outT,bal:b.balance});
  });
  if(!toSend.length){toast("No pending balances","warn");return 0;}
  toSend.forEach((x,i)=>{
    setTimeout(()=>window.open(`https://wa.me/91${x.p.phone}?text=${encodeURIComponent(buildWA(x.p.name,vno,x.crIn,x.crOut,x.bal,mName))}`,"_blank"),i*900);
    setTimeout(()=>window.open(`sms:${x.p.phone}?body=${encodeURIComponent(buildSMS(x.p.name,vno,x.crIn,x.crOut,x.bal,mName))}`,"_blank"),i*900+450);
  });
  return toSend.length;
}

// ── EXCEL DOWNLOAD ────────────────────────────────────────────
function dlCSV(rows,headers,filename){
  const q=v=>`"${String(v==null?"":v).replace(/"/g,'""')}"`;
  const csv=[headers.map(q).join(","),...rows.map(r=>r.map(q).join(","))].join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}));
  a.download=filename;a.click();
  toast("Downloaded "+filename+"!");
}

// ── RENDER ───────────────────────────────────────────────────
function render(){
  document.getElementById("app").innerHTML="";

  else if(SESSION.role==="superadmin")document.getElementById("app").appendChild(buildSA());
  else document.getElementById("app").appendChild(buildMandi());
}

function buildLogin(){
  let email="",pw="";
  const errEl=D("err",["⚠️ Invalid credentials."]);errEl.style.display="none";
  const doLogin=()=>{
    const em=email.trim().toLowerCase();
    // Superadmin
    if(em===DB.superAdmin.email.toLowerCase()&&pw===DB.superAdmin.pw){SESSION={role:"superadmin"};render();return;}
    // Mandi admin
    const mandi=DB.mandis.find(m=>m.adminEmail&&m.adminEmail.toLowerCase()===em&&m.adminPw===pw);
    if(mandi){
      if(mandi.status==="suspended"){errEl.textContent="⚠️ Account suspended.";errEl.style.display="block";return;}
      SESSION={role:"mandiadmin",mandiId:mandi.id,mandiName:mandi.name,maxEmp:mandi.maxEmp};
      maTab="writer";render();return;
    }
    // Employee
    for(const mId of Object.keys(DB.mandiData)){
      const emp=DB.mandiData[mId].employees.find(e=>e.loginEmail&&e.loginEmail.toLowerCase()===em&&e.loginPw===pw&&e.active);

// Fix: stores new password correctly in DB.superAdmin.pw
function showChgPw(who,mandiId,empId){
  let oldPw="",newPw="",confirmPw="";
  const errEl=D("err",["—"]);errEl.style.display="none";
  const con=D("",[
    el("div",{style:{fontSize:"12px",color:T.muted,marginBottom:"14px"}},[who==="superadmin"?"Change Super Admin password":who==="mandiadmin"?"Change Mandi Admin password":"Change Employee password"]),
    who!=="employee"?Fld("CURRENT PASSWORD",Inp("Current password","",v=>oldPw=v,"password")):null,
    Fld("NEW PASSWORD",Inp("Min 6 characters","",v=>newPw=v,"password")),
    Fld("CONFIRM NEW PASSWORD",Inp("Confirm new password","",v=>confirmPw=v,"password")),
    errEl,
    Btn("Update Password",()=>{
      if(newPw.length<6){errEl.textContent="Must be ≥ 6 characters.";errEl.style.display="block";return;}
      if(newPw!==confirmPw){errEl.textContent="Passwords do not match.";errEl.style.display="block";return;}
      if(who==="superadmin"){
        // Read current password directly from DB
        if(oldPw!==DB.superAdmin.pw){errEl.textContent="Current password incorrect.";errEl.style.display="block";return;}
        DB.superAdmin.pw=newPw; // update in DB object
        saveDB(); // persist to localStorage
        closeModals();
        toast("Super Admin password updated! Use new password next login.");
        return;
      }
      if(who==="mandiadmin"){
        const m=DB.mandis.find(x=>x.id===mandiId);
        if(!m)return;
        if(oldPw!==m.adminPw){errEl.textContent="Current password incorrect.";errEl.style.display="block";return;}
        DB.mandis=DB.mandis.map(x=>x.id===mandiId?{...x,adminPw:newPw}:x);
      }
      saveDB();closeModals();toast("Password updated!");
    },"btn bp full")
  ]);
  openModal("🔑 Change Password",con,false);
}
