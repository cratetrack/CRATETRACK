// ── TOAST ────────────────────────────────────────────────────
let toastTmr=null;
function toast(msg,type="ok"){
  let t=document.getElementById("_toast");
  if(!t){t=document.createElement("div");t.id="_toast";document.body.appendChild(t);}
  t.textContent=(type==="err"?"⚠️ ":"✅ ")+msg;
  Object.assign(t.style,{
    position:"fixed",bottom:"24px",left:"50%",transform:"translateX(-50%)",
    background:type==="err"?C.red:type==="warn"?C.gold:C.green,
    color:"#fff",padding:"10px 22px",borderRadius:10,fontWeight:700,
    fontSize:13,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,.3)",
    whiteSpace:"nowrap",display:"block"
  });
  if(toastTmr)clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>{if(t.parentNode)t.remove();},3200);
}

// ── DOM UTILS ────────────────────────────────────────────────
function h(tag,props={},kids=[]){
  const e=document.createElement(tag);
  for(const[k,v] of Object.entries(props)){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k==="cls")e.className=v;
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of kids){
    if(c==null)continue;
    if(c instanceof Node)e.appendChild(c);
    else e.appendChild(document.createTextNode(String(c)));
  }
  return e;
}
const div=(s,k=[])=>h("div",{style:s},k);
const span=(s,k=[])=>h("span",{style:s},k);

function Btn(label,onClick,style={}){
  return h("button",{onclick:onClick,style:{
    background:C.saffron,color:"#fff",border:"none",borderRadius:8,
    padding:"9px 16px",fontWeight:700,fontSize:13,cursor:"pointer",
    display:"inline-flex",alignItems:"center",gap:6,...style
  }},[label]);
}
function GhostBtn(label,onClick,color=C.muted,style={}){
  return Btn(label,onClick,{background:"transparent",color,
    border:`2px solid ${color}`,padding:"7px 14px",...style});
}
function Inp(ph,val,onInput,type="text",style={}){
  const i=h("input",{type,value:val||"",placeholder:ph,style:{
    width:"100%",background:C.paper,border:`1.5px solid ${C.border}`,
    borderRadius:7,padding:"9px 12px",fontSize:13,outline:"none",
    boxSizing:"border-box",...style
  }});
  i.addEventListener("input",e=>onInput(e.target.value));
  return i;
}
function Sel(val,opts,onChange,style={}){
  const s=h("select",{style:{width:"100%",background:C.paper,border:`1.5px solid ${C.border}`,
    borderRadius:7,padding:"9px 10px",fontSize:13,outline:"none",
    boxSizing:"border-box",...style}});
  opts.forEach(([v,l])=>{
    const o=h("option",{value:v},[l]);
    if(String(v)===String(val))o.selected=true;
    s.appendChild(o);
  });
  s.addEventListener("change",e=>onChange(e.target.value));
  return s;
}
function Field(label,inputEl,note=""){
  return div({marginBottom:10},[
    label?h("div",{style:{fontSize:10,fontWeight:700,color:C.muted,
      marginBottom:4,letterSpacing:"0.06em"}},[label]):null,
    inputEl,
    note?h("div",{style:{fontSize:10,color:C.muted,marginTop:3}},[note]):null
  ]);
}
function Card(kids=[],style={}){

}
function Badge(label,color=C.green){

function Modal(title,content,onClose,wide=false){

  ]));
  box.appendChild(div({padding:18},[content]));
  ov.appendChild(box);
  document.body.appendChild(ov);

function closeAllModals(){
  document.querySelectorAll("[data-modal]").forEach(m=>m.remove());
}
function copyText(text){
  try{navigator.clipboard.writeText(text);}catch(e){
    const t=document.createElement("textarea");
    t.value=text;document.body.appendChild(t);t.select();
    document.execCommand("copy");t.remove();
  }
  toast("Copied to clipboard!");
}

// ── BALANCE ──────────────────────────────────────────────────
function getBal(txns,personId){
  const mine=txns.filter(t=>t.personId===personId);
  const out=mine.filter(t=>t.dir==="OUT").reduce((s,t)=>s+t.qty,0);
  const inp=mine.filter(t=>t.dir==="IN").reduce((s,t)=>s+t.qty,0);
  return{totalOut:out,totalIn:inp,balance:Math.max(0,out-inp)};
}

// ── WHATSAPP ─────────────────────────────────────────────────
// Opens WA links for each person in sequence with small delay
function sendWAToAll(people,txns,mandiName,vehicleNo="—"){
  const toSend=[];
  people.forEach(p=>{
    if(!p.phone)return;
    const b=getBal(txns,p.id);
    if(b.balance<=0)return;
    const inToday=txns.filter(t=>t.personId===p.id&&t.dir==="IN"&&t.date===today()).reduce((s,t)=>s+t.qty,0);
    const outToday=txns.filter(t=>t.personId===p.id&&t.dir==="OUT"&&t.date===today()).reduce((s,t)=>s+t.qty,0);
    const msg=buildWAMsg(p.name,vehicleNo,inToday,outToday,b.balance,mandiName);
    toSend.push({phone:p.phone,msg});
  });
  if(!toSend.length){toast("No pending balances to notify","warn");return;}
  toSend.forEach((x,i)=>{
    setTimeout(()=>window.open(`https://wa.me/91${x.phone}?text=${encodeURIComponent(x.msg)}`,"_blank"),i*700);
  });
  toast(`Opening WhatsApp for ${toSend.length} person(s)...`);
}
function buildWAMsg(name,vehicleNo,cratesIn,cratesOut,balance,mandiName){
  return `📦 *${mandiName}* నుండి సందేశం\n\nప్రియమైన *${name}* గారికి,\n\nవాహనం: *${vehicleNo}*\n📥 వచ్చిన క్రేట్లు: *${cratesIn}*\n📤 వెళ్ళిన క్రేట్లు: *${cratesOut}*\n⚖️ మీ దగ్గర మొత్తం బాకీ: *${balance} క్రేట్లు*\n\nదయచేసి వీలైనంత త్వరగా తిరిగి ఇవ్వగలరు.\n📞 మండీ కార్యాలయం సంప్రదించండి.\n_CrateTrack Pro_`;
}

function buildLogin(){
  let email="",pw="";
  const errEl=div({background:C.redL,border:`1px solid ${C.red}`,borderRadius:8,
    padding:"8px 12px",fontSize:12,color:C.red,fontWeight:600,
    marginBottom:10,display:"none"},["⚠️ Invalid credentials."]);

  const doLogin=()=>{
    const em=email.trim().toLowerCase();
    // Super admin
    if(em===DB.superAdmin.email.toLowerCase()&&pw===DB.superAdmin.pw){
      SESSION={role:"superadmin"};render();return;
    }
    // Mandi admin
    const mandi=DB.mandis.find(m=>m.adminEmail&&m.adminEmail.toLowerCase()===em&&m.adminPw===pw);
    if(mandi){
      if(mandi.status==="suspended"){
        errEl.textContent="⚠️ Account suspended. Contact Super Admin.";
        errEl.style.display="block";return;
      }
      SESSION={role:"mandiadmin",mandiId:mandi.id,mandiName:mandi.name,maxEmp:mandi.maxEmp};
      maTab="writer";render();return;
    }
    // Employee login across all mandis
    for(const mId of Object.keys(DB.mandiData)){
      const md=DB.mandiData[mId];
      const emp=md.employees.find(e=>e.loginEmail&&e.loginEmail.toLowerCase()===em&&e.loginPw===pw&&e.active);
      if(emp){
        const m=DB.mandis.find(x=>x.id===mId);
        SESSION={role:"employee",mandiId:mId,mandiName:m?.name||"Mandi",empId:emp.id,empName:emp.name,empRole:emp.role};
        maTab=emp.role==="boxkeeper"?"boxkeeper":"writer";
        render();return;
      }
    }
    errEl.textContent="⚠️ Invalid credentials. Contact your Mandi Admin.";
    errEl.style.display="block";
  };

  const emailInp=Inp("your@email.com","",v=>{email=v;errEl.style.display="none"});
  const pwInp=Inp("••••••••","",v=>{pw=v;errEl.style.display="none"},"password");
  pwInp.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});

  return div({minHeight:"100vh",
    background:`linear-gradient(135deg,${C.dark},#1a0800 50%,#001a08)`,
    display:"flex",alignItems:"center",justifyContent:"center",padding:16},[
    div({width:"100%",maxWidth:400},[
      div({textAlign:"center",marginBottom:28},[
        div({background:C.saffron,width:70,height:70,borderRadius:18,
          display:"flex",alignItems:"center",justifyContent:"center",
          margin:"0 auto 14px",fontSize:36},["📦"]),
        h("div",{style:{fontWeight:900,fontSize:28,color:"#fff"}},["CrateTrack Pro"]),
        h("div",{style:{color:"#64748B",fontSize:13,marginTop:6}},["Mandi Crate Management Platform"]),
      ]),
      Card([
        h("div",{style:{fontWeight:700,fontSize:16,marginBottom:16}},["Sign In"]),
        Field("EMAIL ADDRESS",emailInp),
        Field("PASSWORD",pwInp),
        errEl,
        Btn("Sign In →",doLogin,{width:"100%",padding:11,fontSize:14,justifyContent:"center"}),
        h("div",{style:{textAlign:"center",marginTop:12,fontSize:11,color:C.muted}},
          ["Contact your administrator if you need access."])
      ])
    ])
  ]);
}

        ["⚠️ Set credentials for the Mandi Admin to log in. Share securely."]),
      div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:10},[
        Field("ADMIN EMAIL *",Inp("admin@mandi.com",mf.adminEmail,v=>mf.adminEmail=v,"email",
          {background:"#1E293B",border:"1px solid #334155",color:"#F8FAFC"})),
        Field("ADMIN PASSWORD *",Inp("Min 6 chars",mf.adminPw,v=>mf.adminPw=v,"text",
          {background:"#1E293B",border:"1px solid #334155",color:"#F8FAFC",fontFamily:"monospace"})),
      ])
    ]));

    const save=()=>{
      if(!mf.name.trim()||!mf.owner.trim()){toast("Name & Owner required","err");return;}
      if(!mf.adminEmail.trim()||!mf.adminPw.trim()){toast("Admin email & password required","err");return;}
      if(mf.adminPw.length<6){toast("Password must be ≥ 6 characters","err");return;}
      const em=mf.adminEmail.trim().toLowerCase();
      // check duplicate email
      const dup=DB.mandis.find(m=>m.adminEmail&&m.adminEmail.toLowerCase()===em
        &&(!isEdit||m.id!==mfEdit?.id));
      if(dup){toast("Email already used by another mandi","err");return;}
      if(isEdit){
        DB.mandis=DB.mandis.map(m=>m.id===mfEdit.id
          ?{...m,...mf,adminEmail:em,maxEmp:parseInt(mf.maxEmp)||1}:m);
        toast("Mandi updated!");
      } else {
        const id="M"+uid();
        const nm={...mf,id,adminEmail:em,maxEmp:parseInt(mf.maxEmp)||1};
        DB.mandis.push(nm);
        DB.mandiData[id]={people:[],employees:[],vehicles:[],txns:[]};
        saveDB();mfMode=null;mfEdit=null;renderMandis();
        showCredModal(nm);
        toast("Mandi created! Share credentials.");

      saveDB();mfMode=null;mfEdit=null;renderMandis();
    };

    wrap.appendChild(div({display:"flex",gap:10,marginTop:4},[
      Btn(isEdit?"Save Changes":"Create Mandi",save),
      GhostBtn("Cancel",()=>{mfMode=null;mfEdit=null;renderMandis();})
    ]));
    return wrap;
  }

// ── CHANGE PASSWORD MODAL ─────────────────────────────────────
function showChangePwModal(who,mandiId,empId){
  // who: "superadmin" | "mandiadmin" | "employee"
  let oldPw="",newPw="",confirmPw="";
  const errEl=h("div",{style:{color:C.red,fontSize:12,fontWeight:600,marginBottom:8,display:"none"}},["—"]);

  const content=div({},[
    h("div",{style:{fontSize:12,color:C.muted,marginBottom:14}},
      [who==="superadmin"?"Change Super Admin password":
       who==="mandiadmin"?"Change Mandi Admin password":
       "Change Employee password"]),
    who!=="employee"?Field("CURRENT PASSWORD",
      Inp("Current password","",v=>oldPw=v,"password")):null,
    Field("NEW PASSWORD",Inp("New password (min 6 chars)","",v=>newPw=v,"password")),
    Field("CONFIRM NEW PASSWORD",Inp("Confirm new password","",v=>confirmPw=v,"password")),
    errEl,
    Btn("Update Password",()=>{
      if(newPw.length<6){errEl.textContent="New password must be ≥ 6 characters.";errEl.style.display="block";return;}
      if(newPw!==confirmPw){errEl.textContent="Passwords do not match.";errEl.style.display="block";return;}
      if(who==="superadmin"){
        if(oldPw!==DB.superAdmin.pw){errEl.textContent="Current password is incorrect.";errEl.style.display="block";return;}
        DB.superAdmin.pw=newPw;
      } else if(who==="mandiadmin"){
        const m=DB.mandis.find(x=>x.id===mandiId);
        if(!m){toast("Mandi not found","err");return;}
        if(oldPw!==m.adminPw){errEl.textContent="Current password is incorrect.";errEl.style.display="block";return;}
        DB.mandis=DB.mandis.map(x=>x.id===mandiId?{...x,adminPw:newPw}:x);
      } else if(who==="employee"){
        const md=DB.mandiData[mandiId];
        if(!md){toast("Mandi data not found","err");return;}
        MD.employees=md.employees=md.employees.map(e=>e.id===empId?{...e,loginPw:newPw}:e);
      }
      saveDB();
      document.querySelectorAll("[data-modal]").forEach(x=>x.remove());
      const ov=document.querySelector("[style*='position:fixed'][style*='rgba(0,0,0']");
      if(ov)ov.remove();
      toast("Password updated successfully!");
    },{width:"100%",marginTop:4})
  ]);
  const ov=Modal("🔑 Change Password",content,null,false);
  ov.setAttribute("data-modal","1");
}

        ["","TOTAL","","",lots.reduce((s,l)=>s+l.qty,0),""].forEach(v=>{
          tot.appendChild(h("td",{style:{padding:"7px 8px",fontWeight:800}},[String(v)]));

          border:`1px solid ${done>total?C.red:C.gold}`,borderRadius:8,

  // ── HISTORY ──
  function renderHistory(){
    body.innerHTML="";
    h2("📋 Transaction History","");
    let fDate="",fDir="all",fType="all",fSearch="";

    const fc=Card([]);
    const g=div({display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8,marginBottom:8});
    const di=h("input",{type:"date",value:"",style:{width:"100%",background:C.paper,
      border:`1px solid ${C.border}`,borderRadius:7,padding:"7px 10px",fontSize:12,
      fontFamily:"inherit",outline:"none",boxSizing:"border-box"}});
    di.addEventListener("change",e=>{fDate=e.target.value;refresh();});
    g.appendChild(Field("DATE",di));
    g.appendChild(Field("DIR",Sel("all",[["all","All"],["IN","IN"],["OUT","OUT"]],v=>{fDir=v;refresh();})));
    g.appendChild(Field("TYPE",Sel("all",[["all","All"],["farmer","Farmers"],["buyer","Buyers"]],v=>{fType=v;refresh();})));
    g.appendChild(Field("SEARCH",Inp("Name / Vehicle...","",v=>{fSearch=v;refresh();})));
    fc.appendChild(g);
    const cntEl=h("div",{style:{fontSize:11,color:C.muted}},["—"]);
    fc.appendChild(cntEl);
    body.appendChild(fc);

    const ld=div({});body.appendChild(ld);
    function refresh(){
      const f=MD.txns.filter(t=>{
        if(fDate&&t.date!==fDate)return false;
        if(fDir!=="all"&&t.dir!==fDir)return false;
        if(fType!=="all"&&t.personType!==fType)return false;
        if(fSearch){const s=fSearch.toLowerCase();if(!t.personName.toLowerCase().includes(s)&&!(t.vehicleNo||"").toLowerCase().includes(s))return false;}
        return true;
      }).slice().reverse();
      cntEl.textContent=`Showing ${f.length} of ${MD.txns.length}`;
      ld.innerHTML="";
      if(!f.length){ld.appendChild(h("div",{style:{textAlign:"center",color:C.muted,padding:40}},["No transactions match filters"]));return;}
      f.forEach(t=>{
        ld.appendChild(div({background:t.isOther?"#FFFBEB":C.card,
          border:`1px solid ${t.isOther?"#FDE68A":C.border}`,
          borderRadius:9,padding:"9px 12px",marginBottom:6,
          display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"},[
          span({background:t.dir==="IN"?C.greenL:C.redL,color:t.dir==="IN"?C.green:C.red,
            borderRadius:5,padding:"2px 8px",fontWeight:800,fontSize:10,flexShrink:0},[t.dir]),
          t.isOther?Badge("OTHER",C.gold):null,
          div({flex:1,minWidth:100},[
            h("div",{style:{fontWeight:700,fontSize:12}},[t.personName]),
            h("div",{style:{fontSize:10,color:C.muted}},[t.personType+(t.vehicleNo?" · "+t.vehicleNo:"")+(t.lotNo?" · Lot "+t.lotNo:"")])
          ]),
          h("div",{style:{fontWeight:800,fontSize:16,color:t.isOther?C.gold:C.saffron}},[String(t.qty)]),
          h("div",{style:{fontSize:10,color:C.muted,textAlign:"right"}},[fmtDate(t.date)+"\n"+t.time])
        ]));
      });
    }
    refresh();
  }

  // ── ADMIN ──
  function renderAdmin(){
    body.innerHTML="";
    h2("⚙️ Admin Panel","");

    const tdT=MD.txns.filter(t=>t.date===today());
    const sg=div({display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:10,marginBottom:20});
    [["Vehicles",MD.vehicles.filter(v=>v.date===today()).length,"🚛",C.teal],
     ["Crates IN",tdT.filter(t=>t.dir==="IN").reduce((s,t)=>s+t.qty,0),"⬇",C.green],
     ["Crates OUT",tdT.filter(t=>t.dir==="OUT").reduce((s,t)=>s+t.qty,0),"⬆",C.red],
     ["People",MD.people.filter(p=>p.active).length,"👥",C.blue]].forEach(([l,v,i,c])=>{
      sg.appendChild(Card([h("div",{style:{fontSize:18,marginBottom:4}},[i]),
        h("div",{style:{fontWeight:800,fontSize:20,color:c}},[String(v)]),
        h("div",{style:{fontSize:11,color:C.muted}},[l])],{marginBottom:0}));
    });
    body.appendChild(sg);

    // ── EMPLOYEES ──
    const empC=Card([]);
    const activeEmp=MD.employees.filter(e=>e.active).length;
    empC.appendChild(div({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14},[
      div({},[
        h("div",{style:{fontWeight:700,fontSize:14}},["👤 Employees"]),
        h("div",{style:{fontSize:11,color:activeEmp>=maxEmp?C.red:C.muted}},
          [activeEmp+" / "+maxEmp+" active (limit set by Super Admin)"])
      ]),
      Btn("+ Add Employee",()=>{
        if(activeEmp>=maxEmp){toast(`Limit ${maxEmp} reached. Contact Super Admin.`,"err");return;}
        showAddEmpModal();
      },{background:C.teal,fontSize:12,padding:"7px 12px"})
    ]));

    if(!MD.employees.length){
      empC.appendChild(h("div",{style:{color:C.muted,fontSize:12,textAlign:"center",padding:12}},["No employees yet."]));
    }
    MD.employees.forEach(emp=>{
      empC.appendChild(div({display:"flex",alignItems:"center",gap:10,
        padding:"10px 0",borderTop:`1px solid ${C.border}`,flexWrap:"wrap",opacity:emp.active?1:.6},[
        div({width:36,height:36,borderRadius:"50%",background:emp.active?C.dark:"#94A3B8",
          display:"flex",alignItems:"center",justifyContent:"center",
          color:C.saffron,fontWeight:800,fontSize:12,flexShrink:0},[emp.name[0]]),
        div({flex:1},[
          h("div",{style:{fontWeight:700,fontSize:13}},[emp.name]),
          h("div",{style:{fontSize:10,color:C.muted}},
            [emp.phone+" · Role: "+emp.role]),
          div({display:"flex",gap:8,marginTop:3,flexWrap:"wrap"},[
            h("div",{style:{fontSize:10,color:C.teal,fontFamily:"monospace"}},["📧 "+(emp.loginEmail||"—")]),
            h("div",{style:{fontSize:10,color:C.muted,fontFamily:"monospace"}},["🔑 "+(emp.loginPw?"●●●●●●":"-")])
          ])
        ]),
        Badge(emp.role,emp.role==="writer"?C.teal:emp.role==="boxkeeper"?C.green:C.blue),
        Badge(emp.active?"Active":"Inactive",emp.active?C.green:C.muted),
        div({display:"flex",gap:6,flexWrap:"wrap"},[
          Btn("🔑 Reset PW",()=>showResetEmpPwModal(mandiId,emp,()=>renderAdmin()),
            {background:C.purple,fontSize:11,padding:"5px 8px"}),
          GhostBtn("✏️ Edit",()=>showEditEmpModal(emp),C.blue,{fontSize:11,padding:"5px 8px"}),
          GhostBtn(emp.active?"Deactivate":"Activate",()=>{
            MD.employees=MD.employees.map(e=>e.id===emp.id?{...e,active:!e.active}:e);
            save();renderAdmin();
          },emp.active?C.red:C.green,{fontSize:11,padding:"5px 8px"})
        ])
      ]));
    });
    body.appendChild(empC);

    // ── PEOPLE ──
    body.appendChild(h("div",{style:{fontWeight:700,fontSize:14,marginBottom:10,marginTop:8}},["👥 People Directory"]));
    const ab=div({display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"});
    [["🌾 Add Farmer","farmer",C.amber],["🏪 Add Buyer","buyer",C.blue],["🚛 Add Transporter","transporter",C.saffron]].forEach(([lbl,type,col])=>{
      ab.appendChild(Btn(lbl,()=>showAddPersonModal(type,()=>renderAdmin()),{background:col,fontSize:12,padding:"7px 12px"}));
    });
    body.appendChild(ab);

    ["farmer","buyer","transporter"].forEach(type=>{
      const ppl=MD.people.filter(p=>p.type===type);
      if(!ppl.length)return;
      body.appendChild(h("div",{style:{fontWeight:700,fontSize:11,color:C.muted,
        letterSpacing:"0.07em",textTransform:"uppercase",marginTop:12,marginBottom:8}},
        [type==="farmer"?"🌾 Farmers":type==="buyer"?"🏪 Buyers":"🚛 Transporters"]));
      ppl.forEach(p=>{
        const bal=getBal(MD.txns,p.id);
        body.appendChild(div({background:C.card,border:`1px solid ${p.active?C.border:"#FEE2E2"}`,
          borderRadius:8,padding:"10px 12px",marginBottom:6,
          display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",opacity:p.active?1:.7},[
          div({flex:1},[
            h("div",{style:{fontWeight:700,fontSize:13}},[p.name+(p.active?"":" (inactive)")]),
            h("div",{style:{fontSize:11,color:C.muted}},[p.phone+" · "+(p.address||"—")]),
            type==="transporter"?h("div",{style:{fontSize:11,color:C.saffronD}},["₹"+(p.ratePerCrate||0)+"/crate"]):null
          ]),
          h("div",{style:{fontWeight:800,color:C.saffron,fontSize:13,textAlign:"center",minWidth:50}},[
            String(bal.balance),h("div",{style:{fontSize:9,color:C.muted,fontWeight:400}},["balance"])
          ]),
          GhostBtn(p.active?"Deactivate":"Activate",()=>{
            MD.people=MD.people.map(x=>x.id===p.id?{...x,active:!x.active}:x);
            save();renderAdmin();
          },p.active?C.red:C.green,{fontSize:11,padding:"5px 10px"})
        ]));
      });
    });
  }

  function showAddEmpModal(){
    let name="",phone="",role="writer",pin="",loginEmail="",loginPw="";
    const content=div({},[
      Field("FULL NAME *",Inp("Full name","",v=>name=v)),
      Field("PHONE",Inp("9876543210","",v=>phone=v,"tel")),
      Field("ROLE",Sel("writer",[["writer","✍️ Writer"],["boxkeeper","📦 Box Keeper"],
        ["scanner","📷 Scanner"],["supervisor","👁 Supervisor"]],v=>role=v)),
      Field("PIN (4 digits) *",Inp("1234","",v=>pin=v,"number"),"Used for quick PIN login on shared device"),
      div({background:"#0F172A",borderRadius:10,padding:12,margin:"10px 0"},[
        h("div",{style:{color:"#94A3B8",fontSize:11,fontWeight:700,letterSpacing:"0.07em",marginBottom:8}},["🔑 EMPLOYEE LOGIN CREDENTIALS"]),
        h("div",{style:{background:"#FFF7ED",border:`1px solid ${C.saffron}`,borderRadius:7,
          padding:"7px 10px",fontSize:11,color:C.saffronD,marginBottom:10}},
          ["Set email & password for this employee to log in. Share securely."]),
        Field("LOGIN EMAIL *",Inp("emp@mandi.in","",v=>loginEmail=v,"email",
          {background:"#1E293B",border:"1px solid #334155",color:"#F8FAFC"})),
        Field("LOGIN PASSWORD *",Inp("Min 6 chars","",v=>loginPw=v,"text",
          {background:"#1E293B",border:"1px solid #334155",color:"#F8FAFC",fontFamily:"monospace"}))
      ]),
      Btn("Add Employee",()=>{
        if(!name.trim()||!pin.trim()){toast("Name & PIN required","err");return;}
        if(!loginEmail.trim()||!loginPw.trim()){toast("Login email & password required","err");return;}
        if(loginPw.length<6){toast("Password must be ≥ 6 chars","err");return;}
        const em=loginEmail.trim().toLowerCase();
        // check dup email across all mandis
        let dup=false;
        Object.values(DB.mandiData).forEach(md=>{
          if(md.employees.find(e=>e.loginEmail&&e.loginEmail.toLowerCase()===em))dup=true;
        });
        if(dup){toast("Email already in use","err");return;}
        const id="E"+uid();
        MD.employees.push({id,name,phone,role,pin,loginEmail:em,loginPw,active:true});
        save();
        document.querySelectorAll("[style*='position:fixed']").forEach(o=>{if(o.id!=="toast")o.remove();});
        renderAdmin();
        toast(name+" added as "+role+"!");
      },{width:"100%",marginTop:8,justifyContent:"center"})
    ]);
    Modal("Add Employee",content,null,false);
  }

  function showEditEmpModal(emp){
    let name=emp.name,phone=emp.phone||"",role=emp.role,pin=emp.pin||"",loginEmail=emp.loginEmail||"";
    const content=div({},[
      Field("FULL NAME *",Inp("Full name",name,v=>name=v)),
      Field("PHONE",Inp("9876543210",phone,v=>phone=v,"tel")),
      Field("ROLE",Sel(role,[["writer","✍️ Writer"],["boxkeeper","📦 Box Keeper"],
        ["scanner","📷 Scanner"],["supervisor","👁 Supervisor"]],v=>role=v)),
      Field("PIN",Inp("1234",pin,v=>pin=v,"number")),
      Field("LOGIN EMAIL",Inp("emp@mandi.in",loginEmail,v=>loginEmail=v,"email")),
      h("div",{style:{fontSize:11,color:C.muted,marginBottom:10}},["To change password, use 🔑 Reset PW button on the employee card."]),
      Btn("Save Changes",()=>{
        if(!name.trim()){toast("Name required","err");return;}
        const em=loginEmail.trim().toLowerCase();
        if(em&&em!==emp.loginEmail){
          let dup=false;
          Object.values(DB.mandiData).forEach(md=>{
            if(md.employees.find(e=>e.id!==emp.id&&e.loginEmail&&e.loginEmail.toLowerCase()===em))dup=true;
          });
          if(dup){toast("Email already in use","err");return;}
        }
        MD.employees=MD.employees.map(e=>e.id===emp.id?{...e,name,phone,role,pin,loginEmail:em||e.loginEmail}:e);
        save();
        document.querySelectorAll("[style*='position:fixed']").forEach(o=>{if(o.id!=="toast")o.remove();});
        renderAdmin();toast(name+" updated!");
      },{width:"100%",marginTop:8,justifyContent:"center"})
    ]);
    Modal("Edit Employee — "+emp.name,content,null,false);
  }

  // helpers
  function h2(text,color){
    body.appendChild(h("div",{style:{fontWeight:800,fontSize:18,color:color||C.dark,marginBottom:4}},[text]));
  }
  function sub(text){
    body.appendChild(h("div",{style:{fontSize:12,color:C.muted,marginBottom:14}},[text]));
  }

  function renderBody(){
    body.innerHTML="";
    if(maTab==="writer")renderWriter();
    else if(maTab==="boxkeeper")renderBoxKeeper();
    else if(maTab==="ledger")renderLedger();
    else if(maTab==="history")renderHistory();
    else if(maTab==="admin")renderAdmin();
  }

  // guard employee tab access
  if(isEmployee&&!["writer","boxkeeper","ledger","history"].includes(maTab))maTab="writer";

  renderBody();
  return wrap;
}

// ── PRINT SLIP ────────────────────────────────────────────────
function printSlip(vehicle,mandi){
  const rate=vehicle.ratePerCrate||0;
  const charge=vehicle.totalIn*rate;
  const html=`<!DOCTYPE html><html><head><title>Slip</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Courier New',monospace;padding:20px;font-size:12px;max-width:680px;margin:0 auto}
  h1{font-size:17px;text-align:center}.sub{text-align:center;font-size:10px;color:#555}
  .dbl{border-top:3px double #000;margin:8px 0}.dash{border-top:1px dashed #000;margin:6px 0}
  .t2{text-align:center;font-weight:bold;font-size:13px;margin:5px 0}
  table{width:100%;border-collapse:collapse;margin-bottom:6px}
  th{background:#eee;padding:4px 7px;border:1px solid #999;font-size:11px;text-align:left}
  td{padding:4px 7px;border:1px solid #ccc;font-size:11px}
  .oth td{background:#fffbe6}.tot td{background:#f0f0f0;font-weight:bold}
  .ch{border:2px solid #000;padding:10px;margin:8px 0;background:#f9f9f9}
  .cl{display:flex;justify-content:space-between;margin:3px 0}
  .ct{display:flex;justify-content:space-between;margin-top:8px;padding-top:6px;border-top:2px solid #000;font-weight:bold;font-size:14px}
  .sign{display:flex;justify-content:space-around;margin-top:28px}
  .sl{border-top:1px solid #000;padding-top:4px;font-size:10px;text-align:center;width:130px;margin-top:24px}
  .ft{text-align:center;font-size:9px;color:#aaa;margin-top:12px}</style></head><body>
  <h1>${mandi.name||"Mandi"}</h1>
  <div class="sub">${mandi.address||""}</div><div class="sub">Ph: ${mandi.phone||""}</div>
  <div class="dbl"></div><div class="t2">VEHICLE RECEIPT CUM LOT REGISTER</div><div class="dash"></div>
  <table style="border:none;margin-bottom:8px">
    <tr><td style="border:none"><b>Vehicle:</b> ${vehicle.vehicleNo}</td><td style="border:none;text-align:right"><b>Date:</b> ${fmtDate(vehicle.date)} ${vehicle.time}</td></tr>
    <tr><td style="border:none"><b>Transporter:</b> ${vehicle.transporterName||"—"}</td><td style="border:none;text-align:right"><b>Slip:</b> ${vehicle.id}</td></tr>
  </table>
  <table>
    <tr><td colspan="2"><b>Total Crates</b></td><td style="text-align:right"><b>${vehicle.totalIn}</b></td></tr>
    <tr><td colspan="2">Our Crates</td><td style="text-align:right">${vehicle.lots.filter(l=>!l.isOther).reduce((s,l)=>s+l.qty,0)}</td></tr>
    <tr style="background:#fffbe6"><td colspan="2">Other Boxes</td><td style="text-align:right">${vehicle.lots.filter(l=>l.isOther).reduce((s,l)=>s+l.qty,0)}</td></tr>
  </table>
  <div class="dash"></div><div class="t2">LOT SEGREGATION</div>
  <table><thead><tr><th>Lot</th><th>Name</th><th>Type</th><th>Box</th><th style="text-align:right">Qty</th></tr></thead>
  <tbody>
  ${vehicle.lots.map(l=>`<tr${l.isOther?' class="oth"':""}>
    <td style="text-align:center">${l.lotNo}</td><td>${l.personName}</td>
    <td>${l.personType==="farmer"?"Farmer":"Buyer"}</td>
    <td>${l.isOther?"Other Box":"Our Crate"}</td>
    <td style="text-align:right"><b>${l.qty}</b></td></tr>`).join("")}
  <tr class="tot"><td colspan="4">TOTAL</td><td style="text-align:right">${vehicle.lots.reduce((s,l)=>s+l.qty,0)}</td></tr>
  </tbody></table>
  ${rate>0?`<div class="dash"></div><div class="t2">TRANSPORTER CHARGE</div>
  <div class="ch">
    <div class="cl"><span>Transporter</span><span><b>${vehicle.transporterName}</b></span></div>
    <div class="cl"><span>Total Crates</span><span><b>${vehicle.totalIn}</b></span></div>
    <div class="cl"><span>Rate/Crate</span><span><b>${fmtMoney(rate)}</b></span></div>
    <div class="ct"><span>TOTAL (${vehicle.totalIn}×${fmtMoney(rate)})</span><span>${fmtMoney(charge)}</span></div>
  </div>`:""}
  <div class="sign"><div><div class="sl">Writer</div></div><div><div class="sl">Transporter</div></div><div><div class="sl">Supervisor</div></div></div>
  <div class="ft">CrateTrack Pro — ${new Date().toLocaleString("en-IN")}</div>
  </body></html>`;
  const w=window.open("","_blank","width=820,height=650");
  if(w){w.document.write(html);w.document.close();w.focus();setTimeout(()=>w.print(),600);}
}

// ── DOWNLOAD ─────────────────────────────────────────────────
function downloadHTML(){
  const src=document.documentElement.outerHTML;
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([src],{type:"text/html"}));
  a.download="CrateTrack-Pro.html";a.click();
  toast("Downloading CrateTrack-Pro.html!");
}

// ── BOOT ─────────────────────────────────────────────────────
render();
</script>
</body>
</html>
