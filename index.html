<script>
'use strict';
// ── WALLPAPER / BACKGROUND THEME ──
// Pre-configured Firebase URL (set at build time)
var PRECONFIGURED_FB_URL="https://cratetrack-pro-default-rtdb.firebaseio.com";
// Auto-set Firebase URL if not already set
(function(){if(!localStorage.getItem("ct_fb_url_v4")&&PRECONFIGURED_FB_URL){localStorage.setItem("ct_fb_url_v4",PRECONFIGURED_FB_URL);}})();
var WP_KEY="ct_wp_";
function getWP(mandiId){return localStorage.getItem(WP_KEY+(mandiId||"global"))||"default";}
function setWP(mandiId,theme){localStorage.setItem(WP_KEY+(mandiId||"global"),theme);applyWP(mandiId);}
function applyWP(mandiId){
  var theme=getWP(mandiId);
  var app=document.getElementById("app");
  if(!app)return;
  // Remove all bg- classes
  app.className=app.className.replace(/\bbg-\S+/g,"").trim();
  if(theme&&theme!=="default"){app.classList.add("bg-"+theme,"wp-body");}
  else{app.classList.remove("wp-body");}
}
var WP_THEMES=[
  {id:"default",label:"⬜ Default",emoji:"🏠",desc:"Clean white"},
  {id:"tomato",label:"🍅 Tomato",emoji:"🍅",desc:"Red gradient"},
  {id:"mango",label:"🥭 Mango",emoji:"🥭",desc:"Golden yellow"},
  {id:"grape",label:"🍇 Grape",emoji:"🍇",desc:"Deep purple"},
  {id:"watermelon",label:"🍉 Watermelon",emoji:"🍉",desc:"Green & red"},
  {id:"orange",label:"🍊 Orange",emoji:"🍊",desc:"Warm orange"},
  {id:"banana",label:"🍌 Banana",emoji:"🍌",desc:"Bright yellow"},
  {id:"spinach",label:"🥬 Spinach",emoji:"🥬",desc:"Forest green"},
  {id:"carrot",label:"🥕 Carrot",emoji:"🥕",desc:"Deep orange"},
  {id:"brinjal",label:"🍆 Brinjal",emoji:"🍆",desc:"Dark violet"},
  {id:"chilli",label:"🌶️ Chilli",emoji:"🌶️",desc:"Fiery red"},
  {id:"guava",label:"🍈 Guava",emoji:"🍈",desc:"Pink rose"},
  {id:"coconut",label:"🥥 Coconut",emoji:"🥥",desc:"Warm brown"},
  {id:"lemon",label:"🍋 Lemon",emoji:"🍋",desc:"Sunny yellow"},
  {id:"mint",label:"🌿 Mint",emoji:"🌿",desc:"Cool teal"},
  {id:"pomegranate",label:"🍎 Pomegranate",emoji:"🍎",desc:"Deep crimson"},
  {id:"sky",label:"🌤️ Sky",emoji:"🌤️",desc:"Clear blue"},
  {id:"night",label:"🌙 Night",emoji:"🌙",desc:"Dark navy"},
];
function showWallpaperPicker(mandiId){
  var cur=getWP(mandiId);
  var con=mk("div");
  var sub=mk("div",null,{fontSize:"13px",color:T.muted,marginBottom:"16px"});

  WP_THEMES.forEach(function(wp){
    var card=mk("div",null,{
      borderRadius:"12px",padding:"14px 8px",cursor:"pointer",textAlign:"center",
      border:"2px solid "+(cur===wp.id?"#4F6AF0":"#E4E9F0"),
      background:"#fff",transition:"all 0.15s",
      boxShadow:cur===wp.id?"0 0 0 3px #4F6AF044":"none"
    });
    // Mini preview swatch
    var swatch=mk("div",null,{height:"36px",borderRadius:"8px",marginBottom:"6px"});
    swatch.className="bg-"+wp.id;
    if(wp.id==="default")swatch.style.background="#F5F7FA";
    card.appendChild(swatch);
    var em=mk("div",null,{fontSize:"22px",marginBottom:"2px"});em.textContent=wp.emoji;card.appendChild(em);
    var lb=mk("div",null,{fontSize:"11px",fontWeight:"700",color:T.text,marginBottom:"1px"});lb.textContent=wp.label.split(" ").slice(1).join(" ");card.appendChild(lb);
    var ds=mk("div",null,{fontSize:"10px",color:T.muted});ds.textContent=wp.desc;card.appendChild(ds);
    if(cur===wp.id){var ch=mk("div",null,{color:"#4F6AF0",fontWeight:"800",fontSize:"12px",marginTop:"4px"});ch.textContent="✓ Current";card.appendChild(ch);}
    card.onclick=function(){
      setWP(mandiId,wp.id);
      closeModals();

      if(app){app.className=app.className.replace(/\bbg-\S+/g,"").trim();
        if(wp.id!=="default")app.classList.add("bg-"+wp.id,"wp-body");
        else app.classList.remove("wp-body");}

    };
    grid.appendChild(card);

  con.appendChild(grid);

var T={primary:"#4F6AF0",green:"#2E9E6B",greenLt:"#E8F7F1",red:"#E04C4C",redLt:"#FDEEEE",gold:"#D97706",goldLt:"#FEF3C7",teal:"#0891B2",tealLt:"#E0F4F9",purple:"#7C3AED",orange:"#F97316",muted:"#6B7A99",border:"#E4E9F0",bg:"#F5F7FA",card:"#fff",text:"#1A2332",wa:"#25D366"};

// ── HELPERS ──
function uid(){return Math.random().toString(36).slice(2,7).toUpperCase();}
function today(){return new Date().toISOString().split("T")[0];}
function timeNow(){return new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});}
function fDate(d){return d?new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}):"-";}
function fMoney(n){return "\u20B9"+Number(n||0).toLocaleString("en-IN");}
function dAgo(n){var d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split("T")[0];}
function nowStamp(){return new Date().toLocaleString("en-IN",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});}
function getBal(txns,pid){
  var mine=txns.filter(function(t){return t.personId===pid;});
  var out=mine.filter(function(t){return t.dir==="OUT";}).reduce(function(s,t){return s+t.qty;},0);
  var inp=mine.filter(function(t){return t.dir==="IN";}).reduce(function(s,t){return s+t.qty;},0);
  return {totalOut:out,totalIn:inp,balance:Math.max(0,out-inp)};
}
// Transporter balance = sum of all their farmers' pending crate balances
function getTransporterBal(txns,vehicles,transporterId){
  var tVehicles=(vehicles||[]).filter(function(v){return v.transporterId===transporterId;});
  var farmerMap={};
  tVehicles.forEach(function(v){
    (v.lots||[]).filter(function(l){return !l.isOther;}).forEach(function(l){
      if(!farmerMap[l.personId])farmerMap[l.personId]={name:l.personName,totalOut:0,totalIn:0,balance:0};
    });
  });
  Object.keys(farmerMap).forEach(function(pid){
    var fb=getBal(txns,pid);
    farmerMap[pid].totalOut=fb.totalOut;
    farmerMap[pid].totalIn=fb.totalIn;
    farmerMap[pid].balance=fb.balance;
  });
  var totalBal=Object.values(farmerMap).reduce(function(s,f){return s+f.balance;},0);
  var totalOut=Object.values(farmerMap).reduce(function(s,f){return s+f.totalOut;},0);
  var totalIn=Object.values(farmerMap).reduce(function(s,f){return s+f.totalIn;},0);
  var farmers=Object.keys(farmerMap).map(function(pid){return Object.assign({personId:pid},farmerMap[pid]);}).filter(function(f){return f.balance>0;});
  return {totalOut:totalOut,totalIn:totalIn,balance:totalBal,farmers:farmers};
}
// ── FIX 4: Global sequential lot number per mandi per day ──
function getNextLotNo(MD,date_,pendingLots){
  // Lot numbers are sequential across the entire mandi for the day
  // Vehicle 1234: lot1,lot2 -> Vehicle 2345: lot3,lot4 -> continues
  // pendingLots: lots already assigned in the current unsaved modal session
  var dt=date_||today();
  var maxLot=0;
  // Scan saved vehicles for this date
  (MD.vehicles||[]).forEach(function(v){
    if(v.date===dt){
      (v.lots||[]).forEach(function(l){
        var n=l.globalLotNo||l.lotNo||0;
        if(n>maxLot)maxLot=n;
      });
    }
  });
  // Scan saved txns (covers offline/manual entries)
  (MD.txns||[]).forEach(function(t){
    if(t.date===dt){
      var n=t.globalLotNo||0;
      if(n>maxLot)maxLot=n;
    }
  });
  // Also count lots pending in the current modal (not yet saved)
  if(pendingLots&&pendingLots.length){
    pendingLots.forEach(function(l){
      var n=l.globalLotNo||l.lotNo||0;
      if(n>maxLot)maxLot=n;
    });
  }
  return maxLot+1;
}

// ── FIX 3: Data migration - preserve existing data across updates ──
var LS_KEY="cratetrack_db_v4"; // Keep same key for compatibility
var LS_SCHEMA_KEY="cratetrack_schema_v4";
function migrateDB(db){
  // Preserve superAdmin credentials across updates
  if(!db.superAdmin)db.superAdmin={email:"",pw:""};
  if(!db.mandis)db.mandis=[];
  if(!db.mandiData)db.mandiData={};
  // Migrate employees: role (string) → roles (array)
  if(db.mandiData)Object.keys(db.mandiData).forEach(function(mid){
    var md=db.mandiData[mid];
    if(md.employees)md.employees=md.employees.map(function(e){
      if(!e.roles&&e.role)e.roles=[e.role];
      if(!e.roles)e.roles=["writer"];
      return e;
    });
    // Ensure vehicles array exists
    if(!md.vehicles)md.vehicles=[];
    if(!md.txns)md.txns=[];
    if(!md.people)md.people=[];
  });
  if(!db.slipHeaders)db.slipHeaders={"default":{line1:"CrateTrack Pro",line2:"",line3:"",phone:"",address:""}};
  if(!db.supervisors)db.supervisors=[];
  if(!db.backupEmails)db.backupEmails={};
  return db;
}
function saveDB(){try{localStorage.setItem(LS_KEY,JSON.stringify(DB));}catch(e){console.warn("Storage full",e);}}
function loadDB(){
  try{
    var s=localStorage.getItem(LS_KEY);
    if(s){var d=JSON.parse(s);return migrateDB(d);}
  }catch(e){}
  // Try older key for migration
  try{
    var old=localStorage.getItem("cratetrack_db_v3")||localStorage.getItem("cratetrack_db_v2");
    if(old){var od=JSON.parse(old);toast("Migrating data from previous version...","warn");return migrateDB(od);}
  }catch(e){}
  return null;
}
function exportDBJSON(){
  // Full JSON backup (for restore)
  var blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="cratetrack-full-backup-"+today()+".json";a.click();toast("Full JSON backup downloaded (for restore)!");
}
function formatDateDDMMYYYY(d){
  var dt=d?new Date(d):new Date();
  var dd=String(dt.getDate()).padStart(2,"0");
  var mm=String(dt.getMonth()+1).padStart(2,"0");
  var yyyy=dt.getFullYear();
  return dd+mm+yyyy;
}
function exportMandiAsCSV(mandi,MD,mode){
  // mode: "transactions" or "ledger"
  var safeMandiName=mandi.name.replace(/[^a-zA-Z0-9]/g,"-");
  var dateStr=formatDateDDMMYYYY();
  var fname=safeMandiName+"-backup-"+dateStr+".csv";
  var q=function(v){return '"'+String(v==null?"":v).replace(/"/g,'""')+'"';};
  var rows=[];var headers=[];
  if(mode==="ledger"){
    headers=["Name","Type","Phone","Address","Total OUT","Total IN","Balance","Status"];
    (MD.people||[]).filter(function(p){return p.active;}).forEach(function(p){
      var b=(p.type==="transporter")?getTransporterBal(MD.txns||[],MD.vehicles||[],p.id):getBal(MD.txns||[],p.id);
      rows.push([p.name,p.type,p.phone||"",p.address||"",b.totalOut,b.totalIn,b.balance,b.balance>0?"Owes Crates":"Clear"]);
    });
  } else {
    // Transactions: IN first by lot, then OUT by lot
    headers=["Date","Time","Vehicle","LotNo","Direction","Type","Person","Qty","Box","Note","EnteredBy"];
    var txns=(MD.txns||[]).filter(function(t){return mode==="all"||t.date===today();});
    txns.slice().sort(function(a,b){
      if(a.dir!==b.dir)return a.dir==="IN"?-1:1;
      return (a.globalLotNo||a.lotNo||999)-(b.globalLotNo||b.lotNo||999);
    }).forEach(function(t){

// ── FIX 2: BULK MANDI CSV EXPORT ──
function exportAllMandiCSV(mode){
  var mandis=DB.mandis||[];
  if(!mandis.length){toast("No mandis found","warn");return;}
  var count=0;
  mandis.forEach(function(m,idx){
    var MD=DB.mandiData&&DB.mandiData[m.id];
    if(!MD)return;
    var txns=MD.txns||[];
    var rows;
    if(mode==="today"){
      // 6am-6pm window for today
      var t=today();
      rows=txns.filter(function(tx){
        if(tx.date!==t)return false;
        // Parse time as HH:MM
        var parts=(tx.time||"00:00").split(":");
        var h=parseInt(parts[0]||0);
        return h>=6&&h<18;
      });
    } else {
      rows=txns;
    }
    if(!rows.length)return;
    var csvRows=rows.map(function(t){
      return [t.date,t.time,t.vehicleNo||"",t.globalLotNo||t.lotNo||"",t.dir,t.personType,t.personName,t.qty,t.isOther?"Other":"Ours",t.note||"",t.enteredBy||"",t.enteredAt||""];
    });
    var headers=["Date","Time","Vehicle","LotNo","Direction","Type","Person","Qty","BoxType","Note","EnteredBy","EnteredAt"];
    var q=function(v){return '"'+String(v==null?"":v).replace(/"/g,'""')+'"';};
    var csv=[headers.map(q).join(",")].concat(csvRows.map(function(r){return r.map(q).join(",");})).join("\n");
    var fname="mandi-"+m.name.replace(/[^a-zA-Z0-9]/g,"-")+"-"+(mode==="today"?today():"full")+".csv";
    setTimeout(function(){
      var a=document.createElement("a");
      a.href=URL.createObjectURL(new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"}));
      a.download=fname;a.click();
    },idx*800);
    count++;
  });
  if(count>0)toast("Downloading "+count+" CSV files (one per mandi)...");
  else toast("No transactions found for selected period","warn");
}

// ── MULTI-DEVICE SYNC ──────────────────────────────────────────
// Uses localStorage + BroadcastChannel for same-browser tabs.
// For cross-device: user pastes a Firebase URL (only works when
// the file is served over http/https, not file://).
// The sync button always shows the right option for the context.
var SYNC_FB_URL_KEY = "ct_fb_url_v4";
var SYNC_TIMER = null;
var SYNC_LAST_TS = 0;
var BC = (typeof BroadcastChannel !== "undefined") ? new BroadcastChannel("ct_sync") : null;

// ── BroadcastChannel: instant sync between tabs on same browser ──
if(BC){
  BC.onmessage = function(ev){
    if(ev.data && ev.data.type === "db_update"){
      try{
        var remote = migrateDB(JSON.parse(ev.data.payload));
        DB = remote;
        updateTopbarStats();
        if(maTab==="boxkeeper"||maTab==="writer"||maTab==="ledger") renderBody();
      }catch(e){}
    }
  };
}

function getFbUrl(){
  var u = localStorage.getItem(SYNC_FB_URL_KEY)||"";
  return u.replace(/\/+$/,"");
}
function saveFbUrl(u){ localStorage.setItem(SYNC_FB_URL_KEY,(u||"").replace(/\/+$/,"")); }
function isFileProtocol(){ return window.location.protocol === "file:"; }

// Broadcast to other tabs on same browser (always works)
function broadcastDB(){
  if(BC){ try{ BC.postMessage({type:"db_update", payload:JSON.stringify(DB)}); }catch(e){} }
}

// Patch saveDB once — broadcast + firebase push
var _origSaveDB = saveDB;
saveDB = function(){
  _origSaveDB();
  broadcastDB();
  if(getFbUrl() && !isFileProtocol()) setTimeout(pushToCloud, 400);
};
saveDB.__orig = _origSaveDB;

// ── Firebase push/pull (only works over http/https) ──
async function pushToCloud(){
  var url = getFbUrl(); if(!url || isFileProtocol()) return;
  try{
    await fetch(url+"/cratetrack.json",{
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({db:DB,ts:Date.now()}),
      mode:"cors"
    });
  }catch(e){}
}

async function pullFromCloud(){
  var url=getFbUrl();if(!url||isFileProtocol())return false;
  try{
    var resp=await fetch(url+"/cratetrack.json");
    if(!resp.ok)return false;
    var data=await resp.json();
    if(!data||!data.db||!data.db.superAdmin)return false;
    if(data.ts&&data.ts<=SYNC_LAST_TS)return false;
    // Safety: only block if local has REAL data that remote lacks
    // On a new empty device, always accept remote data
    var rMC=(data.db.mandis||[]).length;
    var lMC=(DB.mandis||[]).length;
    var lTC=Object.values(DB.mandiData||{}).reduce(function(s,m){return s+(m.txns||[]).length+(m.people||[]).length+(m.employees||[]).length;},0);
    // Only block if local genuinely has more data
    if(lMC>0&&lMC>rMC&&lTC>0)return false;
    SYNC_LAST_TS=data.ts||Date.now();
    var r=migrateDB(data.db);
    var mids=Array.from(new Set(Object.keys(DB.mandiData||{}).concat(Object.keys(r.mandiData||{}))));
    mids.forEach(function(mid){
      var L=(DB.mandiData||{})[mid],R=(r.mandiData||{})[mid];
      if(!R){if(!r.mandiData)r.mandiData={};r.mandiData[mid]=L;return;}
      if(!L)return;
      if((L.txns||[]).length>(R.txns||[]).length)R.txns=L.txns;
      if((L.vehicles||[]).length>(R.vehicles||[]).length)R.vehicles=L.vehicles;
      if((L.people||[]).length>(R.people||[]).length)R.people=L.people;
      if((L.employees||[]).length>(R.employees||[]).length)R.employees=L.employees;
    });
    if((DB.mandis||[]).length>(r.mandis||[]).length)r.mandis=DB.mandis;
    if((DB.supervisors||[]).length>(r.supervisors||[]).length)r.supervisors=DB.supervisors;
    DB=r;
    try{localStorage.setItem(LS_KEY,JSON.stringify(DB));}catch(e){}
    return true;
  }catch(e){return false;}
}

function startCloudSync(){
  stopCloudSync();
  if(!getFbUrl()||isFileProtocol()) return;
  pullFromCloud();
  SYNC_TIMER = setInterval(async function(){
    var changed = await pullFromCloud();
    if(changed){
      updateTopbarStats();
      if(maTab==="boxkeeper"||maTab==="writer"||maTab==="ledger") renderBody();
    }
  },5000);
}
function stopCloudSync(){if(SYNC_TIMER){clearInterval(SYNC_TIMER);SYNC_TIMER=null;}}

    var url=(jUrl||"").replace(/\/+$/,"").trim();

    if(!url.startsWith("https://")||!url.includes("firebase")){

    }
    saveFbUrl(url);
    loadBtn.textContent="Loading...";loadBtn.disabled=true;
    // Use image trick to test connectivity first (avoids CORS preflight)
    var xhr=new XMLHttpRequest();
    xhr.open("GET",url+"/cratetrack.json",true);
    xhr.timeout=15000;
    xhr.onload=function(){
      if(xhr.status===200){
        try{
          var data=JSON.parse(xhr.responseText);
          if(data&&data.db&&data.db.superAdmin&&data.db.superAdmin.email){
            DB=migrateDB(data.db);
            SYNC_LAST_TS=data.ts||Date.now();
            try{localStorage.setItem(LS_KEY,JSON.stringify(DB));}catch(e){}
            startCloudSync();render();
            toast("✅ Loaded! Sign in with your credentials.");
          } else {
            saveFbUrl("");
            errEl.innerHTML="No CrateTrack data at this URL.<br>Go to your main device → ☁️ Synced → Push Now → then try again.";
            errEl.style.display="block";loadBtn.textContent="Load Data & Continue →";loadBtn.disabled=false;
          }
        }catch(e){
          saveFbUrl("");
          errEl.textContent="Could not read data. Try again.";
          errEl.style.display="block";loadBtn.textContent="Load Data & Continue →";loadBtn.disabled=false;
        }
      } else if(xhr.status===401||xhr.status===403){
        saveFbUrl("");
        errEl.innerHTML="Permission denied. In Firebase Console → Realtime Database → Rules → set .read:true .write:true → Publish.";
        errEl.style.display="block";loadBtn.textContent="Load Data & Continue →";loadBtn.disabled=false;
      } else {
        saveFbUrl("");
        errEl.textContent="Firebase error "+xhr.status+". Check the URL is correct.";
        errEl.style.display="block";loadBtn.textContent="Load Data & Continue →";loadBtn.disabled=false;
      }
    };
    xhr.onerror=function(){
      // XHR failed - this means CORS or network. 
      // Since we know their Firebase URL, try fetch as last resort
      fetch(url+"/cratetrack.json").then(function(r){return r.json();}).then(function(data){
        if(data&&data.db&&data.db.superAdmin){
          DB=migrateDB(data.db);SYNC_LAST_TS=data.ts||Date.now();
          try{localStorage.setItem(LS_KEY,JSON.stringify(DB));}catch(e){}
          startCloudSync();render();toast("✅ Loaded!");
        } else {
          showManualEntry(errEl,loadBtn);
        }
      }).catch(function(){showManualEntry(errEl,loadBtn);});
    };

    xhr.send();
  });
