// ─── TOAST ───────────────────────────────────────────────────
let toastTimer=null;
function showToast(msg,type="ok"){
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";document.body.appendChild(t);}
  t.textContent=(type==="err"?"⚠️ ":"✅ ")+msg;
  t.style.cssText=`position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:${type==="err"?C.red:C.green};color:#fff;padding:10px 20px;
    border-radius:10px;font-weight:700;font-size:13px;z-index:9999;
    box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap;`;
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{if(t.parentNode)t.parentNode.removeChild(t);},3000);
}

// ─── DOM HELPERS ──────────────────────────────────────────────
function el(tag,props={},children=[]){
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k==="cls")e.className=v;
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e[k]=v;
  });
  children.forEach(c=>{
    if(c===null||c===undefined)return;
    if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}
function div(style={},children=[]){return el("div",{style},children);}
function btn(label,onClick,style={}){
  return el("button",{onclick:onClick,style:{
    background:C.saffron,color:"#fff",border:"none",borderRadius:8,
    padding:"9px 16px",fontWeight:700,fontSize:13,cursor:"pointer",...style
  }},[label]);
}
function ghostBtn(label,onClick,color=C.muted){
  return btn(label,onClick,{background:"transparent",color,border:`2px solid ${color}`,padding:"7px 14px"});
}
function inp(placeholder,value,onInput,type="text",style={}){
  const i=el("input",{type,value:value||"",placeholder,style:{
    width:"100%",background:C.paper,border:`1.5px solid ${C.border}`,
    borderRadius:7,padding:"9px 12px",fontSize:13,outline:"none",boxSizing:"border-box",...style
  }});
  i.oninput=e=>onInput(e.target.value);
  return i;
}
function sel(value,options,onChange,style={}){
  const s=el("select",{style:{width:"100%",background:C.paper,border:`1.5px solid ${C.border}`,
    borderRadius:7,padding:"9px 10px",fontSize:13,outline:"none",boxSizing:"border-box",...style}});
  options.forEach(([v,l])=>{
    const o=el("option",{value:v},[l]);
    if(v===value)o.selected=true;
    s.appendChild(o);
  });
  s.onchange=e=>onChange(e.target.value);
  return s;
}
function field(label,inputEl,note=""){
  return div({marginBottom:10},[
    label?el("div",{style:{fontSize:10,fontWeight:700,color:C.muted,marginBottom:4,letterSpacing:"0.06em"}},[label]):null,

  ]);
}
function card(children=[],style={}){

    padding:16,marginBottom:12,...style},children);
}
function badge(label,color=C.green){

function modal(title,content,onClose,wide=false){

      ]),
      div({padding:18},[content])
    ])
  ]);
  document.body.appendChild(overlay);
  return overlay;
}
function copyToClipboard(text){
  try{navigator.clipboard.writeText(text);}catch(e){
    const t=document.createElement("textarea");t.value=text;
    document.body.appendChild(t);t.select();document.execCommand("copy");t.remove();
  }
  showToast("Copied!");
}

// ─── BALANCE CALC ─────────────────────────────────────────────
function getBalance(txns,personId){
  const mine=txns.filter(t=>t.personId===personId);
  const out=mine.filter(t=>t.dir==="OUT").reduce((s,t)=>s+t.qty,0);
  const inp=mine.filter(t=>t.dir==="IN").reduce((s,t)=>s+t.qty,0);
  return {totalOut:out,totalIn:inp,balance:Math.max(0,out-inp)};
}

function buildLogin(){
  let email="",pw="";
  const errDiv=div({background:C.redL,border:`1px solid ${C.red}`,borderRadius:8,
    padding:"8px 12px",fontSize:12,color:C.red,fontWeight:600,marginBottom:10,display:"none"},["⚠️ Invalid credentials. Contact your administrator."]);

  const doLogin=()=>{
    const em=email.trim().toLowerCase();
    if(em===SA.email&&pw===SA.pw){
      currentSession={role:"superadmin"};render();return;
    }
    // check mandi admins
    const mandi=DB.mandis.find(m=>
      m.adminEmail&&m.adminEmail.toLowerCase()===em&&m.adminPw===pw
    );
    if(mandi){
      if(mandi.status==="suspended"){
        errDiv.textContent="⚠️ This account is suspended. Contact Super Admin.";
        errDiv.style.display="block";return;
      }
      currentSession={role:"mandiadmin",mandiId:mandi.id,mandiName:mandi.name,maxEmp:mandi.maxEmp};
      render();return;
    }
    errDiv.textContent="⚠️ Invalid credentials. Contact your administrator.";
    errDiv.style.display="block";
  };

  const emailInp=inp("your@email.com","",v=>{email=v;errDiv.style.display="none"});
  const pwInp=inp("••••••••","",v=>{pw=v;errDiv.style.display="none"},"password");
  pwInp.onkeydown=e=>{if(e.key==="Enter")doLogin();};

  return div({minHeight:"100vh",background:`linear-gradient(135deg,${C.dark},#1a0800 50%,#001a08)`,
    display:"flex",alignItems:"center",justifyContent:"center",padding:16},[
    div({width:"100%",maxWidth:400},[
      div({textAlign:"center",marginBottom:28},[
        div({background:C.saffron,width:70,height:70,borderRadius:18,display:"flex",
          alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:36},["📦"]),
        el("div",{style:{fontWeight:900,fontSize:28,color:"#fff"}}),
        el("div",{style:{fontWeight:900,fontSize:28,color:"#fff"}},["CrateTrack Pro"]),
        el("div",{style:{color:"#64748B",fontSize:13,marginTop:6}},["Mandi Crate Management Platform"]),
      ]),
      card([
        el("div",{style:{fontWeight:700,fontSize:16,marginBottom:16}},["Sign In"]),
        field("EMAIL ADDRESS",emailInp),
        field("PASSWORD",pwInp),
        errDiv,
        btn("Sign In →",doLogin,{width:"100%",padding:"11px",fontSize:14}),
        el("div",{style:{textAlign:"center",marginTop:12,fontSize:11,color:C.muted}},
          ["Contact your administrator if you need access."])
      ])
    ])
  ]);
}

      inputs[key]=i;
      grid.appendChild(field(lbl,i));
    });

    const planSel=sel(mf.plan,
      [["Starter","Starter — ₹999/mo"],["Professional","Professional — ₹2,499/mo"],["Enterprise","Enterprise — ₹5,999/mo"]],
      v=>mf.plan=v);
    const statusSel=sel(mf.status,
      [["active","Active"],["trial","Trial (free period)"],["suspended","Suspended"]],
      v=>mf.status=v);
    grid.appendChild(field("PLAN",planSel));
    grid.appendChild(field("STATUS",statusSel));
    wrap.appendChild(grid);

    wrap.appendChild(div({background:"#0F172A",borderRadius:10,padding:14,margin:"12px 0"},[
      el("div",{style:{color:"#94A3B8",fontSize:11,fontWeight:700,letterSpacing:"0.07em",marginBottom:10}},
        ["🔑 MANDI ADMIN LOGIN CREDENTIALS"]),
      el("div",{style:{background:"#FFF7ED",border:`1px solid ${C.saffron}`,borderRadius:7,
        padding:"8px 12px",fontSize:11,color:C.saffronD,marginBottom:12}},
        ["⚠️ You set these credentials. The Mandi Admin will use them to log in. Share securely."]),
      div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:10},[
        field("ADMIN LOGIN EMAIL *",inp("admin@example.com",mf.adminEmail,v=>mf.adminEmail=v,"email",
          {background:"#1E293B",border:"1px solid #334155",color:"#F8FAFC",padding:"10px 12px"})),
        field("ADMIN PASSWORD *",inp("Min 6 characters",mf.adminPw,v=>mf.adminPw=v,"text",
          {background:"#1E293B",border:"1px solid #334155",color:"#F8FAFC",padding:"10px 12px",fontFamily:"monospace"})),
      ])
    ]));

    const saveFn=()=>{
      if(!mf.name.trim()||!mf.owner.trim()){showToast("Name & Owner required","err");return;}
      if(!mf.adminEmail.trim()||!mf.adminPw.trim()){showToast("Admin email & password required","err");return;}
      if(mf.adminPw.length<6){showToast("Password must be at least 6 characters","err");return;}
      const emailLc=mf.adminEmail.trim().toLowerCase();
      // check duplicate email (skip self when editing)
      const dup=DB.mandis.find(m=>m.adminEmail&&m.adminEmail.toLowerCase()===emailLc&&(!isEdit||m.id!==editingMandi.id));
      if(dup){showToast("Email already used by another mandi","err");return;}

      if(isEdit){
        DB.mandis=DB.mandis.map(m=>m.id===editingMandi.id?{...m,...mf,adminEmail:emailLc,maxEmp:parseInt(mf.maxEmp)||1}:m);
        showToast("Mandi updated & credentials saved!");
      } else {
        const id="M"+uid();
        const newM={...mf,id,adminEmail:emailLc,maxEmp:parseInt(mf.maxEmp)||1};
        DB.mandis.push(newM);
        // init empty data for new mandi
        DB.mandiData[id]={people:[],employees:[],vehicles:[],txns:[]};
        persist();
        mandiFormMode=null;editingMandi=null;
        renderMandis();
        showCredModal(newM);
        showToast("Mandi created! Share credentials.");
        return;
      }
      persist();
      mandiFormMode=null;editingMandi=null;
      renderMandis();
    };

    wrap.appendChild(div({display:"flex",gap:10,marginTop:4},[
      btn(isEdit?"Save Changes":"Create Mandi & Set Credentials",saveFn),
      ghostBtn("Cancel",()=>{mandiFormMode=null;editingMandi=null;renderMandis();})
    ]));
    return wrap;
  }

  function showSegregationModal(vehicle){
    let lots=[];
    let personType="farmer",selectedPerson="",qtyStr="",isOther=false;

    const overlayDiv=div({position:"fixed",inset:0,background:"rgba(0,0,0,.65)",
      zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:12});
    document.body.appendChild(overlayDiv);

    function rebuildModal(){
      overlayDiv.innerHTML="";
      const total=vehicle.totalIn;
      const done=lots.reduce((s,l)=>s+l.qty,0);
      const rem=total-done;

      const farmers=MD.people.filter(p=>p.type==="farmer"&&p.active);
      const buyers=MD.people.filter(p=>p.type==="buyer"&&p.active);
      const people=personType==="farmer"?farmers:buyers;

      const box=div({background:C.card,borderRadius:16,width:"100%",maxWidth:560,
        maxHeight:"92vh",overflowY:"auto"});

      // header
      box.appendChild(div({display:"flex",justifyContent:"space-between",alignItems:"center",
        padding:"14px 18px",borderBottom:`1px solid ${C.border}`,
        position:"sticky",top:0,background:C.card,zIndex:1},[
        el("div",{style:{fontWeight:800,fontSize:15}},["📂 Lot Segregation — "+vehicle.vehicleNo]),
        btn("×",()=>{overlayDiv.remove();},{background:"none",color:C.muted,border:"none",fontSize:24})
      ]));

      const content=div({padding:18});

      // progress
      content.appendChild(div({background:C.paper,borderRadius:6,height:10,overflow:"hidden",marginBottom:4},[
        div({background:done===total?C.green:done>total?C.red:C.teal,height:10,borderRadius:6,
          width:Math.min(100,done/Math.max(total,1)*100)+"%",transition:"width .3s"})
      ]));
      content.appendChild(div({display:"flex",justifyContent:"space-between",fontSize:11,
        color:C.muted,marginBottom:14},[
        el("span",{},["Done: "+done+" / "+total]),
        el("span",{style:{color:rem<0?C.red:rem===0?C.green:C.teal}},
          [rem<0?`Over by ${-rem}`:rem===0?"✅ Complete":`${rem} remaining`])
      ]));

      // toggle own/other
      const toggleRow=div({display:"flex",gap:6,marginBottom:10});
      [["📦 Our Crate",false],[" 🔶 Other Box",true]].forEach(([lbl,val])=>{
        toggleRow.appendChild(btn(lbl,()=>{isOther=val;rebuildModal();},{
          flex:1,background:isOther===val?(val?C.gold:C.teal):"#fff",
          color:isOther===val?"#fff":(val?C.gold:C.teal),
          border:`2px solid ${val?C.gold:C.teal}`,padding:"8px 4px",fontSize:11
        }));
      });
      content.appendChild(toggleRow);

      if(isOther){
        content.appendChild(div({background:"#FFFBEB",border:`1px solid #FDE68A`,borderRadius:7,
          padding:"7px 10px",fontSize:11,color:"#92400E",marginBottom:10},[
          "🔶 Other Box: select the owner for tracking. Marked as 'Other Box' in all reports."
        ]));
      }

      // add lot form
      const addBox=div({background:isOther?"#FFFBEB":"#F0FDFA",
        border:`1px solid ${isOther?"#FDE68A":"#99F6E4"}`,borderRadius:10,padding:14,marginBottom:12});

      const typeSelEl=sel(personType,[["farmer","🌾 Farmer"],["buyer","🏪 Buyer"]],v=>{personType=v;selectedPerson="";rebuildModal();});
      addBox.appendChild(field("PERSON TYPE",typeSelEl));

      const personOpts=[["","— Select Person —"],...people.map(p=>[p.id,p.name])];
      const personSelEl=sel(selectedPerson,personOpts,v=>selectedPerson=v);
      const addPersonBtn=btn("+",()=>{showAddPersonModal(personType,()=>{rebuildModal();});},
        {background:C.teal,padding:"0 10px",fontSize:18,borderRadius:7,marginLeft:4});
      addBox.appendChild(field("SELECT PERSON",
        div({display:"flex",gap:4},[personSelEl,addPersonBtn])));

      const qtyInpEl=inp(`max ${rem}`,qtyStr,v=>qtyStr=v,"number",
        {fontSize:22,fontWeight:800,textAlign:"center"});
      addBox.appendChild(field("QUANTITY",qtyInpEl));

      addBox.appendChild(btn(isOther?"Add Other Box Lot":"Add Lot",()=>{
        const qty=parseInt(qtyStr||0);
        if(qty<=0){showToast("Enter quantity","err");return;}
        if(qty>rem){showToast(`Only ${rem} left`,"err");return;}
        if(!selectedPerson){showToast("Select a person","err");return;}
        const person=MD.people.find(p=>p.id===selectedPerson);
        lots.push({lotNo:lots.length+1,personId:person.id,personName:person.name,
          personType:person.type,qty,isOther});
        qtyStr="";selectedPerson="";rebuildModal();
      },{background:isOther?C.gold:C.teal,width:"100%",marginTop:4}));
      content.appendChild(addBox);

      // lots table
      if(lots.length){
        const tbl=el("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:12,marginBottom:12}});
        tbl.appendChild(el("thead",{},[el("tr",{style:{background:C.paper}},
          ["Lot","Person","Type","Box","Qty",""].map(h=>el("th",{style:{padding:"6px 8px",textAlign:"left",fontWeight:700,color:C.muted,fontSize:10}},[h]))
        )]));
        const tbody=el("tbody",{});
        lots.forEach((l,i)=>{
          const row=el("tr",{style:{borderTop:`1px solid ${C.border}`,background:l.isOther?"#FFFBEB":i%2?"#fff":"#F8FAFC"}});
          [l.lotNo,l.personName,l.personType==="farmer"?"🌾":"🏪",l.isOther?"Other":"Ours",l.qty].forEach((v,ci)=>{

  function showOutModal(vehicle){
    let note="";
    const overlayDiv=div({position:"fixed",inset:0,background:"rgba(0,0,0,.65)",

    document.body.appendChild(overlayDiv);

      ["Confirm crates leaving. All lots will be recorded as OUT."]));

    // summary by lot
    const tbl=el("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:12,marginBottom:12}});
    tbl.appendChild(el("thead",{},[el("tr",{style:{background:C.paper}},
      ["Lot","Person","Box","Qty"].map(h=>el("th",{style:{padding:"7px 8px",textAlign:"left",fontWeight:700,color:C.muted,fontSize:10}},[h]))
    )]));
    const tbody=el("tbody",{});
    vehicle.lots.forEach(l=>{
      const row=el("tr",{style:{borderTop:`1px solid ${C.border}`,background:l.isOther?"#FFFBEB":"#fff"}});
      [l.lotNo,l.personName,l.isOther?"Other Box":"Our Crate",l.qty].forEach((v,i)=>{
        row.appendChild(el("td",{style:{padding:"7px 8px",fontWeight:i===3?700:400}},[String(v)]));
      });
      tbody.appendChild(row);
    });
    tbl.appendChild(tbody);
    content.appendChild(tbl);

    content.appendChild(div({background:"#EFF6FF",borderRadius:8,padding:"10px 12px",
      fontSize:12,marginBottom:12,border:`1px solid #BFDBFE`},[
      el("div",{style:{fontWeight:700,color:C.blue,marginBottom:4}},["📱 Auto-sent on confirm:"]),
      el("div",{style:{fontSize:11,color:C.blue}},["✅ WhatsApp (Telugu) to all persons with balance"])
    ]));

    content.appendChild(field("NOTE (optional)",inp("Any remarks...","",v=>note=v)));

    content.appendChild(div({display:"flex",gap:8},[
      btn("← Back",()=>overlayDiv.remove(),{background:"transparent",color:C.muted,border:`1px solid ${C.border}`}),
      btn("✅ Confirm OUT + Send WhatsApp",()=>{
        const outTxns=vehicle.lots.map(l=>({
          id:"X"+uid(),vehicleNo:vehicle.vehicleNo,dir:"OUT",personId:l.personId,
          personName:l.personName,personType:l.personType,qty:l.qty,
          date:today(),time:timeNow(),lotNo:l.lotNo,isOther:l.isOther,note
        }));
        MD.txns.push(...outTxns);
        MD.vehicles=MD.vehicles.map(v=>v.id===vehicle.id?{...v,outDone:true,outTime:timeNow()}:v);
        save();

        // send WA
        const allTxns=[...MD.txns];
        const notified=new Set();
        vehicle.lots.forEach(l=>{
          if(notified.has(l.personId))return;
          notified.add(l.personId);
          const person=MD.people.find(p=>p.id===l.personId);
          if(!person?.phone)return;
          const bal=getBalance(allTxns,l.personId);
          const inToday=allTxns.filter(t=>t.personId===l.personId&&t.dir==="IN"&&t.date===today()).reduce((s,t)=>s+t.qty,0);
          const outToday=allTxns.filter(t=>t.personId===l.personId&&t.dir==="OUT"&&t.date===today()).reduce((s,t)=>s+t.qty,0);
          sendWA(person,vehicle.vehicleNo,inToday,outToday,bal.balance,mandi.name);
        });

        overlayDiv.remove();
        renderMABody();
        showToast(`OUT confirmed · messages sent to ${notified.size} person(s)!`);
      },{flex:1,background:C.green,padding:10})
    ]));

    const box=div({background:C.card,borderRadius:16,width:"100%",maxWidth:480,
      maxHeight:"92vh",overflowY:"auto"});
    box.appendChild(div({display:"flex",justifyContent:"space-between",alignItems:"center",
      padding:"14px 18px",borderBottom:`1px solid ${C.border}`,
      position:"sticky",top:0,background:C.card},[
      el("div",{style:{fontWeight:800,fontSize:15}},["Confirm OUT"]),
      btn("×",()=>overlayDiv.remove(),{background:"none",color:C.muted,border:"none",fontSize:24})
    ]));
    box.appendChild(div({padding:18},[content]));
    overlayDiv.appendChild(box);
  }

  function renderHistory(){
    body.innerHTML="";
    body.appendChild(el("div",{style:{fontWeight:800,fontSize:18,marginBottom:14}},["📋 Transaction History"]));

    let filterDate="",filterDir="all",filterType="all",filterSearch="";

    const filterCard=card([]);
    const grid=div({display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8,marginBottom:8});

    const dateInp=el("input",{type:"date",value:"",style:{width:"100%",background:C.paper,
      border:`1px solid ${C.border}`,borderRadius:7,padding:"7px 10px",fontSize:12,
      fontFamily:"inherit",outline:"none",boxSizing:"border-box"}});
    dateInp.onchange=e=>{filterDate=e.target.value;refreshList();};
    grid.appendChild(field("DATE",dateInp));

    const dirSel=sel("all",[["all","All Directions"],["IN","IN Only"],["OUT","OUT Only"]],v=>{filterDir=v;refreshList();});
    grid.appendChild(field("DIRECTION",dirSel));

    const typeSel=sel("all",[["all","All Types"],["farmer","Farmers"],["buyer","Buyers"],["transporter","Transporters"]],v=>{filterType=v;refreshList();});
    grid.appendChild(field("TYPE",typeSel));

    const searchInp=inp("Name / Vehicle...","",v=>{filterSearch=v;refreshList();});
    grid.appendChild(field("SEARCH",searchInp));

    filterCard.appendChild(grid);

    const countDiv=el("div",{style:{fontSize:11,color:C.muted}},["Showing all"]);
    filterCard.appendChild(countDiv);
    body.appendChild(filterCard);

    const listDiv=div({});
    body.appendChild(listDiv);

    function refreshList(){
      const filtered=MD.txns.filter(t=>{
        if(filterDate&&t.date!==filterDate)return false;
        if(filterDir!=="all"&&t.dir!==filterDir)return false;
        if(filterType!=="all"&&t.personType!==filterType)return false;
        if(filterSearch){
          const s=filterSearch.toLowerCase();
          if(!t.personName.toLowerCase().includes(s)&&!(t.vehicleNo||"").toLowerCase().includes(s))return false;
        }
        return true;
      }).slice().reverse();

      countDiv.textContent=`Showing ${filtered.length} of ${MD.txns.length} transactions`;
      listDiv.innerHTML="";
      if(!filtered.length){
        listDiv.appendChild(el("div",{style:{textAlign:"center",color:C.muted,padding:40}},["No transactions match filters"]));
        return;
      }
      filtered.forEach(t=>{
        listDiv.appendChild(div({background:t.isOther?"#FFFBEB":C.card,
          border:`1px solid ${t.isOther?"#FDE68A":C.border}`,
          borderRadius:9,padding:"9px 12px",marginBottom:6,
          display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"},[
          el("span",{style:{background:t.dir==="IN"?C.greenL:C.redL,
            color:t.dir==="IN"?C.green:C.red,borderRadius:5,
            padding:"2px 8px",fontWeight:800,fontSize:10,flexShrink:0}},[t.dir]),
          t.isOther?badge("OTHER BOX",C.gold):null,
          div({flex:1,minWidth:100},[
            el("div",{style:{fontWeight:700,fontSize:12}},[t.personName]),
            el("div",{style:{fontSize:10,color:C.muted}},[t.personType+(t.vehicleNo?" · 🚛 "+t.vehicleNo:"")+(t.lotNo?" · Lot "+t.lotNo:"")])
          ]),
          el("div",{style:{fontWeight:800,fontSize:16,color:t.isOther?C.gold:C.saffron}},[String(t.qty)]),
          el("div",{style:{fontSize:10,color:C.muted,textAlign:"right"}},[fmtDate(t.date)+"\n"+t.time])
        ]));
      });
    }
    refreshList();
  }

    body.appendChild(el("div",{style:{fontWeight:700,fontSize:14,marginBottom:10,marginTop:8}},["👥 People Directory"]));
    const addBtns=div({display:"flex",gap:8,marginBottom:12});
    [["🌾 Add Farmer","farmer"],["🏪 Add Buyer","buyer"],["🚛 Add Transporter","transporter"]].forEach(([lbl,type])=>{
      addBtns.appendChild(btn(lbl,()=>showAddPersonModal(type,()=>{renderAdmin();}),
        {background:type==="farmer"?C.amber:type==="buyer"?C.blue:C.saffron,fontSize:12,padding:"7px 12px"}));
    });
    body.appendChild(addBtns);

    ["farmer","buyer","transporter"].forEach(type=>{
      const people=MD.people.filter(p=>p.type===type);
      if(!people.length)return;
      body.appendChild(el("div",{style:{fontWeight:700,fontSize:11,color:C.muted,
        letterSpacing:"0.07em",textTransform:"uppercase",marginTop:12,marginBottom:8}},
        [type==="farmer"?"🌾 Farmers":type==="buyer"?"🏪 Buyers":"🚛 Transporters"]));
      people.forEach(p=>{
        const bal=getBalance(MD.txns,p.id);
        body.appendChild(div({background:C.card,border:`1px solid ${p.active?C.border:"#FEE2E2"}`,
          borderRadius:8,padding:"10px 12px",marginBottom:6,
          display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",opacity:p.active?1:.7},[
          div({flex:1},[
            el("div",{style:{fontWeight:700,fontSize:13}},[p.name+(p.active?"":" (inactive)")]),
            el("div",{style:{fontSize:11,color:C.muted}},[p.phone+" · "+(p.address||"—")]),
            type==="transporter"?el("div",{style:{fontSize:11,color:C.saffronD}},["₹"+(p.ratePerCrate||0)+"/crate"]):null
          ]),
          el("div",{style:{fontWeight:800,color:C.saffron,fontSize:13,textAlign:"center",minWidth:50}},[
            String(bal.balance),el("div",{style:{fontSize:9,color:C.muted,fontWeight:400}},["balance"])
          ]),
          ghostBtn(p.active?"Deactivate":"Activate",()=>{
            MD.people=MD.people.map(x=>x.id===p.id?{...x,active:!x.active}:x);
            save();renderAdmin();
          },p.active?C.red:C.green)
        ]));
      });
    });
  }

  function showAddEmpModal(){
    let name="",phone="",role="writer",pin="";
    const content=div({},[
      field("FULL NAME *",inp("Full name","",v=>name=v)),
      field("PHONE",inp("9876543210","",v=>phone=v,"tel")),
      field("ROLE",sel("writer",[["writer","✍️ Writer"],["boxkeeper","📦 Box Keeper"],
        ["scanner","📷 Scanner"],["supervisor","👁 Supervisor"]],v=>role=v)),
      field("PIN (4 digits) *",inp("1234","",v=>pin=v,"number"),
        "Used for employee login on shared device"),
      btn("Add Employee",()=>{
        if(!name.trim()||!pin.trim()){showToast("Name & PIN required","err");return;}
        if(pin.length<4){showToast("PIN must be at least 4 digits","err");return;}
        const id="E"+uid();
        MD.employees.push({id,name,phone,role,pin,active:true});
        save();
        document.querySelectorAll("[style*='position:fixed']").forEach(o=>{if(o.id!=="toast")o.remove();});
        renderAdmin();
        showToast(name+" added as "+role+"!");
      },{width:"100%",marginTop:8})
    ]);
    modal("Add Employee",content,null,false);
  }

  // ── MAIN RENDER ──
  function renderMABody(){
    body.innerHTML="";
    if(maTab==="writer") renderWriter();
    else if(maTab==="boxkeeper") renderBoxKeeper();
    else if(maTab==="ledger") renderLedger();
    else if(maTab==="history") renderHistory();
    else if(maTab==="admin") renderAdmin();
  }

  renderMABody();
  return wrap;
}

// ─── PRINT SLIP ───────────────────────────────────────────────
function printSlip(vehicle,mandi){
  const rate=vehicle.ratePerCrate||0;
  const charge=vehicle.totalIn*rate;
  const html=`<!DOCTYPE html><html><head><title>Slip ${vehicle.vehicleNo}</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Courier New',monospace;padding:20px;font-size:12px;max-width:680px;margin:0 auto}
  h1{font-size:17px;text-align:center}
  .sub{text-align:center;font-size:10px;color:#555;margin-bottom:2px}
  .dbl{border-top:3px double #000;margin:8px 0}
  .dash{border-top:1px dashed #000;margin:6px 0}
  .title2{text-align:center;font-weight:bold;font-size:13px;margin:5px 0}
  table{width:100%;border-collapse:collapse;margin-bottom:6px}
  th{background:#eee;padding:4px 7px;border:1px solid #999;font-size:11px;text-align:left}
  td{padding:4px 7px;border:1px solid #ccc;font-size:11px}
  .other td{background:#fffbe6}.total td{background:#f0f0f0;font-weight:bold}
  .charge{border:2px solid #000;padding:10px;margin:8px 0;background:#f9f9f9}
  .cline{display:flex;justify-content:space-between;margin:3px 0}
  .ctotal{display:flex;justify-content:space-between;margin-top:8px;padding-top:6px;border-top:2px solid #000;font-weight:bold;font-size:14px}
  .sign{display:flex;justify-content:space-around;margin-top:28px}
  .sline{border-top:1px solid #000;padding-top:4px;font-size:10px;text-align:center;width:130px;margin-top:24px}
  .footer{text-align:center;font-size:9px;color:#aaa;margin-top:12px}
  </style></head><body>
  <h1>${mandi.name||"Mandi"}</h1>
  <div class="sub">${mandi.address||""}</div>
  <div class="sub">Ph: ${mandi.phone||""} ${mandi.gstin?"| GSTIN: "+mandi.gstin:""}</div>
  <div class="dbl"></div>
  <div class="title2">VEHICLE RECEIPT CUM LOT REGISTER</div>
  <div class="dash"></div>
  <table style="border:none;margin-bottom:8px">
    <tr><td style="border:none"><b>Vehicle No:</b> ${vehicle.vehicleNo}</td>
    <td style="border:none;text-align:right"><b>Date:</b> ${fmtDate(vehicle.date)} ${vehicle.time}</td></tr>
    <tr><td style="border:none"><b>Transporter:</b> ${vehicle.transporterName||"—"}</td>
    <td style="border:none;text-align:right"><b>Slip No:</b> ${vehicle.id}</td></tr>
  </table>
  <table>
    <tr><td colspan="2"><b>Total Crates</b></td><td style="text-align:right"><b>${vehicle.totalIn}</b></td></tr>
    <tr><td colspan="2">Our Mandi Crates</td><td style="text-align:right">${vehicle.lots.filter(l=>!l.isOther).reduce((s,l)=>s+l.qty,0)}</td></tr>
    <tr style="background:#fffbe6"><td colspan="2">Other Boxes</td><td style="text-align:right">${vehicle.lots.filter(l=>l.isOther).reduce((s,l)=>s+l.qty,0)}</td></tr>
  </table>
  <div class="dash"></div>
  <div class="title2">LOT SEGREGATION</div>
  <table>
    <thead><tr><th>Lot</th><th>Name</th><th>Type</th><th>Box</th><th style="text-align:right">Qty</th></tr></thead>
    <tbody>
      ${vehicle.lots.map(l=>`<tr${l.isOther?' class="other"':""}>
        <td style="text-align:center">${l.lotNo}</td>
        <td>${l.personName}</td>
        <td>${l.personType==="farmer"?"Farmer":l.personType==="buyer"?"Buyer":"Transporter"}</td>
        <td>${l.isOther?"Other Box":"Our Crate"}</td>
        <td style="text-align:right"><b>${l.qty}</b></td>
      </tr>`).join("")}
      <tr class="total"><td colspan="4">TOTAL</td><td style="text-align:right">${vehicle.lots.reduce((s,l)=>s+l.qty,0)}</td></tr>
    </tbody>
  </table>
  ${rate>0?`<div class="dash"></div>
  <div class="title2">TRANSPORTER CHARGE</div>
  <div class="charge">
    <div class="cline"><span>Transporter</span><span><b>${vehicle.transporterName}</b></span></div>
    <div class="cline"><span>Total Crates</span><span><b>${vehicle.totalIn}</b></span></div>
    <div class="cline"><span>Rate Per Crate</span><span><b>${fmtMoney(rate)}</b></span></div>
    <div class="ctotal"><span>TOTAL (${vehicle.totalIn} × ${fmtMoney(rate)})</span><span>${fmtMoney(charge)}</span></div>
  </div>`:""}
  <div class="sign">
    <div><div class="sline">Writer</div></div>
    <div><div class="sline">Transporter</div></div>
    <div><div class="sline">Supervisor</div></div>
  </div>
  <div class="footer">CrateTrack Pro — ${new Date().toLocaleString("en-IN")}</div>
  </body></html>`;
  const w=window.open("","_blank","width=820,height=650");
  if(w){w.document.write(html);w.document.close();w.focus();setTimeout(()=>w.print(),600);}
}

// ─── BOOT ─────────────────────────────────────────────────────
render();
</script>
</body>
</html>
